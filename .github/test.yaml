name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: python:3.12

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install package and pytest
        run: |
          pip install .
          pip install pytest

      - name: Run tests
        run: pytest tests/ --junitxml=report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: report.xml